; PlatformIO configuration for the Vybes Teensy DSP firmware.
; Build:   pio run -d Teensy
; Upload:  pio run -d Teensy -t upload

[platformio]
src_dir = fir_filters
default_envs = teensy41

; Teensy 4.1 - the firmware relies on its built-in SD card slot
; (SD.begin(BUILTIN_SDCARD) in fir_filters.ino) for FIR filter files.
[env:teensy41]
platform = teensy@^5.0.0
board = teensy41
framework = arduino
; USB type - equivalent of Arduino IDE's Tools > USB Type menu.
; "Serial + MIDI + Audio" is required for AudioInputUSB (USB audio in) while
; keeping the USB serial console for debug output.
build_flags = -D USB_MIDI_AUDIO_SERIAL
; Audio, SD, SPI, SerialFlash and Wire ship with the Teensy platform package.

; Host-native test environment: pio test -d Teensy -e native
; Compiles the hardware-free parts of the firmware (FirEngine, PEQMath,
; FIRLoader, SerialCommandRouter) against a minimal Arduino shim
; (test/native_shim) plus a vendored CMSIS-DSP (host_libs/CMSIS-DSP, plain C
; on the host), and runs the Unity test suites in test/.
[env:native]
platform = native
build_flags =
    -DVYBES_NATIVE
    -DUNITY_INCLUDE_DOUBLE
    -O2
    -g
    -Itest/native_shim
    -I../ESP/esp-web-server
; Only the hardware-free sources; the sketch and AudioStream wrappers need
; the Teensy core.
build_src_filter =
    -<*>
    +<FirEngine.cpp>
    +<PEQMath.cpp>
    +<FIRLoader.cpp>
    +<SerialCommandRouter.cpp>
lib_extra_dirs = host_libs
test_build_src = yes
; -std=gnu++17 must only reach the C++ compiler (CMSIS-DSP is C)
extra_scripts = pre:native_cxxflags.py
