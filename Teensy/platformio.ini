; PlatformIO configuration for the Vybes Teensy DSP firmware.
; Build:   pio run -d Teensy
; Upload:  pio run -d Teensy -t upload

[platformio]
src_dir = fir_filters
default_envs = teensy41

; Teensy 4.1 - the firmware relies on its built-in SD card slot
; (SD.begin(BUILTIN_SDCARD) in fir_filters.ino) for FIR filter files.
[env:teensy41]
platform = teensy@^5.0.0
board = teensy41
framework = arduino
; USB type - equivalent of Arduino IDE's Tools > USB Type menu.
; "Serial + MIDI + Audio" is required for AudioInputUSB (USB audio in) while
; keeping the USB serial console for debug output.
build_flags = -D USB_MIDI_AUDIO_SERIAL
; Audio, SD, SPI, SerialFlash and Wire ship with the Teensy platform package.
