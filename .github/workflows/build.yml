name: Build

on:
  push:
  pull_request:
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  esp8266:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp-${{ hashFiles('ESP/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run -d ESP

  teensy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-teensy-${{ hashFiles('Teensy/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run -d Teensy

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: WebUI/package-lock.json
      - run: npm ci
        working-directory: WebUI
      - run: npm run build
        working-directory: WebUI
