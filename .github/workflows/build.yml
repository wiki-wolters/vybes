name: Build

on:
  push:
  pull_request:
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  esp32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp-${{ hashFiles('ESP/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run -d ESP -e esp32dev -e esp32s3

  teensy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-teensy-${{ hashFiles('Teensy/platformio.ini') }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install platformio
      - run: pio run -d Teensy
      # Host-native unit tests (FIR engine, FIR loader, PEQ math, command
      # router, ESP<->Teensy protocol round-trip)
      - run: pio test -d Teensy -e native

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: WebUI/package-lock.json
      - run: npm ci
        working-directory: WebUI
      # Unit tests (eq-math, utilities)
      - run: npm test
        working-directory: WebUI
      # API contract suite runs against the mock server (spawned by the test
      # harness); point it at real hardware with VYBES_API_URL when running
      # locally
      - run: npm ci
        working-directory: mock-server
      - run: npm run test:contract
        working-directory: WebUI
      - run: npm run build
        working-directory: WebUI
