; PlatformIO configuration for the Vybes ESP8266 web server firmware.
; Build:   pio run -d ESP
; Upload:  pio run -d ESP -t upload
; Monitor: pio device monitor -b 115200  (debug output is on D4/GPIO2, see docs/WIRING.md)

[platformio]
src_dir = esp-web-server
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266@^4.2.1
board = nodemcuv2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    ; ESPHome-maintained forks of me-no-dev's ESPAsyncWebServer/ESPAsyncTCP:
    ; same headers and API, but actually published in the PIO registry.
    esphome/ESPAsyncTCP-esphome@^2.0.0
    esphome/ESPAsyncWebServer-esphome@^3.3.0
    tzapu/WiFiManager@^2.0.17
    crankyoldgit/IRremoteESP8266@^2.8.6
    mathertel/LiquidCrystal_PCF8574@^2.2.0
; If a library above fails to resolve, search the registry for the exact
; name/owner: pio pkg search "<name>"
; Fallback if the esphome forks ever misbehave: use the originals as git deps
;   https://github.com/me-no-dev/ESPAsyncTCP.git
;   https://github.com/me-no-dev/ESPAsyncWebServer.git
