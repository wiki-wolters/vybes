; PlatformIO configuration for the Vybes ESP8266 web server firmware.
; Build:   pio run -d ESP
; Upload:  pio run -d ESP -t upload
; Monitor: pio device monitor -b 115200  (debug output is on D4/GPIO2, see docs/WIRING.md)

[platformio]
src_dir = esp-web-server
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266@^4.2.1
board = nodemcuv2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
    me-no-dev/ESPAsyncTCP@^1.2.2
    me-no-dev/ESP Async WebServer@^1.2.4
    tzapu/WiFiManager@^2.0.17
    crankyoldgit/IRremoteESP8266@^2.8.6
    mathertel/LiquidCrystal_PCF8574@^2.2.0
; If a library above fails to resolve, search the registry for the exact
; name/owner: pio pkg search "<name>"
