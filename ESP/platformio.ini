; PlatformIO configuration for the Vybes ESP32 web server firmware.
;
; Two supported boards - pick with -e (default is the classic ESP32):
;   pio run -d ESP                          classic ESP32 DevKitC (WROOM-32)
;   pio run -d ESP -e esp32s3               ESP32-S3 DevKitC-1
;
; Upload:  pio run -d ESP [-e esp32s3] -t upload
; FS:      pio run -d ESP [-e esp32s3] -t uploadfs   (web UI + certs)
; Monitor: pio device monitor -b 115200 (debug output is on USB; on the S3
;          use the port labeled "UART")
;
; Per-board GPIO assignments live in esp-web-server/board_pins.h.

[platformio]
src_dir = esp-web-server
data_dir = esp-web-server/data
default_envs = esp32dev

; Settings shared by every board env
[env]
platform = espressif32@^6.9.0
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; No OTA: one big app slot (TLS + WiFiManager need the flash) + ~0.9MB FS
board_build.partitions = huge_app.csv
lib_deps =
    ; v7 keeps the v6 API as deprecated aliases; PsychicHttp requires ^7
    bblanchon/ArduinoJson@^7.0.4
    ; HTTP/HTTPS/WebSocket server on top of ESP-IDF's esp_http_server.
    ; (ESPAsyncWebServer has no server-side TLS, hence the switch.)
    hoeken/PsychicHttp@^1.2.1
    tzapu/WiFiManager@^2.0.17
    crankyoldgit/IRremoteESP8266@^2.8.6
    mathertel/LiquidCrystal_PCF8574@^2.2.0
; If a library above fails to resolve, search the registry for the exact
; name/owner: pio pkg search "<name>"

[env:esp32dev]
board = esp32dev

[env:esp32s3]
board = esp32-s3-devkitc-1
